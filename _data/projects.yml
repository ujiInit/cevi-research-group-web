- name: "E-DIPLOMA"
  icon: "fa-globe"
  description: "Proyecto Horizonte Europa (2022-2025) coordinado por la UJI con un presupuesto de 3 millones de euros. Su objetivo es transformar el ecosistema de e-learning europeo mediante una plataforma que combina realidad virtual, inteligencia artificial, tecnologías interactivas, chatbots y gamificación."
  link: "https://e-diplomaproject.eu/"
  link_title: "Web oficial del proyecto E-DIPLOMA"

- name: "OSCAR"
  icon: "fa-users"
  description: "Proyecto Erasmus+ que promueve el desarrollo de habilidades digitales a través de experiencias de aprendizaje no convencionales en línea e híbridas para estudiantes de secundaria. Incluye coding camps sobre juegos serios y realidad extendida."
  link: "https://oscar-codingcamps.eu/es/"
  link_title: "Web oficial del proyecto OSCAR"

- name: "FAIR GAME"
  icon: "fa-shield"
  description: "Proyecto CERV (2026-2028) coordinado por el Instituto de Nuevas Tecnologías de la Imagen (INIT) de la UJI. Fomenta la concienciación, inclusión y resiliencia en entornos de juego para proteger los derechos y la salud mental de la infancia, abordando riesgos como el ciberacoso y las prácticas de monetización explotadoras."
  link: "https://www.uji.es/serveis/opei/historico/otros/fairgame/"
  link_title: "Página del proyecto FAIR GAME en la UJI"

- name: "Inner Worlds"
  icon: "fa-cubes"
  description: "Proyecto de innovación educativa que utiliza entornos inmersivos para el aprendizaje de habilidades transversales. Más información en su web oficial."
  link: "https://innerworlds.eu/"
  link_title: "Web oficial del proyecto Inner Worlds"

- name: "Paciente3D"
  icon: "fa-heartbeat"
  description: "Iniciativa enmarcada en el programa UJI>LAB Impuls de la UJI. Liderado por Inmaculada Remolar Quintana, tiene como objetivo mejorar la capacitación médica del estudiantado de Medicina mediante el desarrollo de un prototipo de realidad virtual que permite practicar la intubación orotraqueal, uno de los principales métodos para el manejo de las vías respiratorias."
  link: "https://www.linkedin.com/posts/init-institute-of-new-imaging-technologies-_paciente3d-ha-sido-recientemente-noticia-activity-7424737258051629058-na1Z/?originalSubdomain=es"
  link_title: "Noticia sobre Paciente3D en LinkedIn"

- name: "Prometeo"
  icon: "fa-rocket"
  description: "Proyecto de investigación en tecnologías inmersivas para la promoción de habilidades STEAM en jóvenes, financiado por la Unión Europea. Desarrolla entornos virtuales colaborativos y experiencias de aprendizaje interactivo."
  link: "https://prometeo-project.eu/"
  link_title: "Web oficial del proyecto Prometeo"