# Site settings
title: "CEVI Research Group"
name: "CEVI - Computación Evolutiva y Visualización Interactiva"
description: "Grupo de investigación en algoritmos evolutivos, visualización de datos e IA aplicada de la Universitat Jaume I"
url: "https://ujiInit.github.io"
baseurl: "/cevi-research-group-web"

# Exclude these files from the built site
exclude: [bibble, README.md, Makefile, screenshot.png, Gemfile, Gemfile.lock]

# Syntax highlighting
highlighter: rouge

# Permalink structure for blog posts
permalink: /blog/:year/:month/:day/:title.html

# Sections on the "people" page (en español)
roles:
  - key: faculty
    name: Investigadores Principales
  - key: staff
    name: Personal de Apoyo
  - key: postdoc
    name: Investigadores Postdoctorales
  - key: grad
    name: Estudiantes de Doctorado
  - key: ugrad
    name: Estudiantes de Grado
  - key: ugrad-alum
    name: Antiguos Estudiantes de Grado
  - key: collab
    name: Colaboradores
  - key: alum
    name: Alumni

# Number of news stories on the front page
front_page_news: 5

# Collections for projects
collections:
  projects:
    output: true

# Navigation bar links (se usa en default.html)
navigation:
  - title: Inicio
    link: /
  - title: Equipo
    link: /#people
  - title: Investigación
    link: /research.html
  - title: Publicaciones
    link: /publications.html
  - title: Código
    link: /code.html